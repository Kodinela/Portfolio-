<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare HMS - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Your existing CSS + Enhanced */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --secondary: #10b981;
            --warning: #f59e0b; --danger: #ef4444; --dark: #1e293b; --success: #10b981;
            --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-300: #cbd5e1; --gray-400: #94a3b8;
            --gray-500: #64748b; --gray-600: #475569; --white: #ffffff; 
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius: 12px; --transition: all 0.3s ease;
        }
        body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--dark); line-height: 1.6; }
        
        /* Enhanced Layout */
        .app-container { min-height: 100vh; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; }
        .loading.active { display: flex; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--gray-200); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Auth Pages */
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding: 20px; }
        .auth-box { background: var(--white); padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 450px; }
        .auth-tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid var(--gray-200); }
        .auth-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; background: var(--gray-100); transition: var(--transition); }
        .auth-tab.active { background: var(--primary); color: white; }
        .auth-content { display: none; }
        .auth-content.active { display: block; }
        .otp-section { display: none; }
        .otp-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Your existing styles (login-box, form-group, btn, etc.) remain exactly the same */
        .login-container, .login-box, .form-group, .btn { /* Copy your existing styles */ }
        /* ... all your existing CSS ... */

        /* Charts */
        .chart-container { height: 300px; background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }

        /* Filters */
        .filters { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-select, .filter-date { padding: 10px 12px; border: 2px solid var(--gray-200); border-radius: 8px; font-size: 14px; }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
        .empty-state i { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }

        /* Responsive */
        @media (max-width: 768px) {
            .filters { flex-direction: column; align-items: stretch; }
            .filter-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Loading Spinner -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <!-- Registration/Login Page -->
    <div id="authPage" class="app-container">
        <div class="auth-container">
            <div class="auth-box">
                <div class="login-logo">
                    <i class="fas fa-hospital-user" style="font-size: 60px; color: var(--primary); margin-bottom: 15px;"></i>
                    <h1 style="font-size: 28px; color: var(--dark); font-weight: 700;">MediCare HMS</h1>
                    <p style="color: var(--gray-500); font-size: 14px;">Hospital Management System</p>
                </div>

                <!-- Auth Tabs -->
                <div class="auth-tabs">
                    <div class="auth-tab active" data-tab="register">Register</div>
                    <div class="auth-tab" data-tab="login">Login</div>
                </div>

                <!-- Registration Form -->
                <div id="registerForm" class="auth-content active">
                    <form id="regForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="regName" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="regEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="regPhone" placeholder="Enter phone number" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="regPassword" placeholder="Create password (min 6 chars)" required>
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select id="regRole" required>
                                <option value="">Select role</option>
                                <option value="administrator">Administrator</option>
                                <option value="doctor">Doctor</option>
                                <option value="nurse">Nurse</option>
                                <option value="receptionist">Receptionist</option>
                                <option value="pharmacist">Pharmacist</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </form>
                </div>

                <!-- OTP Verification -->
                <div id="otpSection" class="otp-section">
                    <div class="form-group">
                        <label>Enter OTP sent to <span id="otpEmail"></span></label>
                        <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" maxlength="6" required>
                    </div>
                    <button id="verifyOtp" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-check"></i> Verify & Continue
                    </button>
                    <button id="resendOtp" class="btn" style="width: 100%; margin-top: 10px; background: var(--gray-200);">
                        Resend OTP
                    </button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="auth-content">
                    <form id="loginFormSubmit">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="loginEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; color: var(--gray-500); font-size: 13px;">
                        Demo: admin@medicare.com / admin123
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard (Your existing structure) -->
    <div id="dashboard" class="dashboard" style="display: none;">
        <!-- Your existing sidebar + main content -->
        <div class="sidebar">...</div>
        <div class="main-content">
            <div class="header">...</div>
            <div class="content-area" id="contentArea">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button id="modalCancel" class="btn">Cancel</button>
                <button id="modalSave" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script>
        class MediCareHMS {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('medicare_users')) || [];
                this.data = this.loadDemoData();
                this.currentUser = null;
                this.currentPage = 'dashboard';
                this.init();
            }

            init() {
                this.bindEvents();
                this.showLoading(false);
                if (this.users.length === 0) {
                    this.seedDemoUsers();
                }
            }

            seedDemoUsers() {
                const demoUsers = [
                    { id: 1, name: 'Administrator', email: 'admin@medicare.com', password: 'admin123', role: 'administrator', verified: true, phone: '+1234567890' },
                    { id: 2, name: 'Dr. John Smith', email: 'doctor@medicare.com', password: 'doctor123', role: 'doctor', verified: true, phone: '+1234567891' }
                ];
                this.users = demoUsers;
                localStorage.setItem('medicare_users', JSON.stringify(this.users));
            }

            bindEvents() {
                // Auth tabs
                document.querySelectorAll('.auth-tab').forEach(tab => {
                    tab.addEventListener('click', (e) => this.switchAuthTab(e));
                });

                // Registration
                document.getElementById('regForm').addEventListener('submit', (e) => this.handleRegister(e));

                // OTP
                document.getElementById('verifyOtp').addEventListener('click', () => this.verifyOTP());
                document.getElementById('resendOtp').addEventListener('click', () => this.resendOTP());

                // Login
                document.getElementById('loginFormSubmit').addEventListener('submit', (e) => this.handleLogin(e));

                // Modals
                document.querySelector('.modal-close').addEventListener('click', () => this.closeModal());
                document.getElementById('modalCancel').addEventListener('click', () => this.closeModal());
                document.getElementById('modalSave').addEventListener('click', () => this.handleModalSave());
            }

            switchAuthTab(e) {
                const tab = e.currentTarget.dataset.tab;
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-content').forEach(c => c.classList.remove('active'));
                e.currentTarget.classList.add('active');
                
                if (tab === 'register') {
                    document.getElementById('registerForm').classList.add('active');
                    document.getElementById('otpSection').classList.remove('active');
                } else {
                    document.getElementById('loginForm').classList.add('active');
                }
            }

            async handleRegister(e) {
                e.preventDefault();
                this.showLoading(true);

                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const phone = document.getElementById('regPhone').value;
                const password = document.getElementById('regPassword').value;
                const role = document.getElementById('regRole').value;

                // Check if user exists
                if (this.users.find(u => u.email === email)) {
                    this.showAlert('User already exists!', 'error');
                    this.showLoading(false);
                    return;
                }

                // Generate OTP
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                sessionStorage.setItem('reg_otp', otp);
                sessionStorage.setItem('reg_data', JSON.stringify({ name, email, phone, password, role }));

                // Simulate email sending
                document.getElementById('otpEmail').textContent = email;
                document.getElementById('registerForm').classList.remove('active');
                document.getElementById('otpSection').classList.add('active');

                this.showAlert(`OTP sent to ${email}! Check your inbox (demo: ${otp})`, 'success');
                this.showLoading(false);
            }

            verifyOTP() {
                const otp = document.getElementById('otpCode').value;
                const savedOtp = sessionStorage.getItem('reg_otp');
                const regData = JSON.parse(sessionStorage.getItem('reg_data'));

                if (otp === savedOtp) {
                    // Save user
                    const newUser = {
                        id: Date.now(),
                        ...regData,
                        verified: true,
                        createdAt: new Date().toISOString()
                    };
                    this.users.push(newUser);
                    localStorage.setItem('medicare_users', JSON.stringify(this.users));
                    
                    this.showAlert('Registration successful! You can now login.', 'success');
                    this.resetAuthForms();
                    document.getElementById('loginForm').classList.add('active');
                } else {
                    this.showAlert('Invalid OTP!', 'error');
                }
            }

            resendOTP() {
                // Resend logic
                this.showAlert('OTP resent successfully!', 'success');
            }

            resetAuthForms() {
                document.getElementById('regForm').reset();
                document.getElementById('otpCode').value = '';
                sessionStorage.removeItem('reg_otp');
                sessionStorage.removeItem('reg_data');
            }

            handleLogin(e) {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;

                const user = this.users.find(u => u.email === email && u.password === password && u.verified);
                if (user) {
                    this.currentUser = user;
                    this.showDashboard();
                } else {
                    this.showAlert('Invalid credentials or unverified account!', 'error');
                }
            }

            showDashboard() {
                document.getElementById('authPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                // Set user info
                document.getElementById('userName').textContent = this.currentUser.name;
                document.getElementById('userRole').textContent = this.currentUser.role;
                document.getElementById('userAvatar').textContent = this.currentUser.name[0];

                this.loadPage('dashboard');
            }

            loadPage(page) {
                this.currentPage = page;
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                document.querySelector(`[data-page="${page}"]`).classList.add('active');

                const titles = {
                    dashboard: 'Dashboard Overview',
                    patients: 'Patients Management',
                    appointments: 'Appointments',
                    doctors: 'Doctors Directory',
                    records: 'Medical Records',
                    billing: 'Billing & Payments',
                    pharmacy: 'Pharmacy Inventory'
                };

                document.getElementById('pageTitle').textContent = titles[page];
                document.getElementById('pageSubtitle').textContent = `Manage ${page} efficiently`;

                this.showLoading(true);
                setTimeout(() => {
                    document.getElementById('contentArea').innerHTML = this.renderPage(page);
                    this.bindPageEvents(page);
                    this.showLoading(false);
                }, 300);
            }

            renderPage(page) {
                const rolePermissions = {
                    administrator: ['dashboard', 'patients', 'appointments', 'doctors', 'records', 'billing', 'pharmacy'],
                    doctor: ['dashboard', 'patients', 'appointments', 'records'],
                    nurse: ['dashboard', 'patients', 'appointments'],
                    receptionist: ['dashboard
