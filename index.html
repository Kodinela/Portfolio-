<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare HMS</title>
<style>
body{font-family:Arial;margin:0}
.login,.register{display:flex;flex-direction:column;gap:10px;max-width:300px;margin:100px auto}
input,button{padding:10px}
#dashboard{display:none;padding:20px}
</style>
</head>
<body><div id="auth">
    <div class="login">
        <h2>Login</h2>
        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p>No account? <a href="#" onclick="showRegister()">Register</a></p>
    </div><div class="register" style="display:none">
    <h2>Register</h2>
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <p><a href="#" onclick="showLogin()">Back to login</a></p>
</div>

</div><div id="dashboard">
    <h1>Dashboard</h1>
    <div id="data"></div>
    <button onclick="logout()">Logout</button>
</div><script>
function showRegister(){
    document.querySelector('.login').style.display='none';
    document.querySelector('.register').style.display='flex';
}
function showLogin(){
    document.querySelector('.register').style.display='none';
    document.querySelector('.login').style.display='flex';
}

function register(){
    const email=document.getElementById('regEmail').value;
    const password=document.getElementById('regPassword').value;

    if(!email || !password){alert('Fill all');return}

    const users=JSON.parse(localStorage.getItem('users')||'[]');
    users.push({email,password,verified:false});
    localStorage.setItem('users',JSON.stringify(users));

    alert('Registered! Now verify email (simulated)');

    // simulate email verification
    users[users.length-1].verified=true;
    localStorage.setItem('users',JSON.stringify(users));

    showLogin();
}

function login(){
    const email=document.getElementById('loginEmail').value;
    const password=document.getElementById('loginPassword').value;

    const users=JSON.parse(localStorage.getItem('users')||'[]');
    const user=users.find(u=>u.email===email && u.password===password);

    if(!user){alert('Invalid');return}
    if(!user.verified){alert('Verify email first');return}

    localStorage.setItem('currentUser',JSON.stringify(user));
    showDashboard();
}

function showDashboard(){
    document.getElementById('auth').style.display='none';
    document.getElementById('dashboard').style.display='block';

    const user=JSON.parse(localStorage.getItem('currentUser'));

    document.getElementById('data').innerHTML=`
        <p>Email: ${user.email}</p>
        <p>Status: Verified User</p>
        <p>Patients: 120</p>
        <p>Doctors: 15</p>
        <p>Appointments: 32</p>
    `;
}

function logout(){
    localStorage.removeItem('currentUser');
    location.reload();
}

if(localStorage.getItem('currentUser')) showDashboard();
</script></body>
</html>
