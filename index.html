<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare HMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
}

/* AUTH UI */
.auth-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.auth-box{
    background:white;
    padding:35px;
    border-radius:12px;
    width:100%;
    max-width:420px;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.auth-box h1{
    text-align:center;
    margin-bottom:5px;
}

.auth-box p{
    text-align:center;
    color:#64748b;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

.form-group input,
.form-group select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.link{
    color:#2563eb;
    cursor:pointer;
    font-weight:500;
}

.auth-content{display:none;}
.auth-content.active{display:block;}

#dashboard{
    display:none;
    padding:20px;
}
</style>
</head>

<body>

<div class="auth-container">
<div class="auth-box">

<h1>MediCare HMS</h1>
<p>Hospital Management System</p>

<!-- LOGIN -->
<div id="loginPage" class="auth-content active">
<form id="loginForm">
<div class="form-group">
<label>Email</label>
<input type="email" id="loginEmail" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="loginPassword" required>
</div>

<button class="btn">Login</button>
</form>

<p style="margin-top:15px;text-align:center;">
Don't have account? 
<span class="link" id="openRegister">Register</span>
</p>
</div>

<!-- REGISTER -->
<div id="registerPage" class="auth-content">
<form id="registerForm">
<div class="form-group">
<label>Full Name</label>
<input type="text" id="regName" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="regEmail" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="regPhone" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="regPassword" required>
</div>

<div class="form-group">
<label>Role</label>
<select id="regRole" required>
<option value="">Select role</option>
<option value="admin">Admin</option>
<option value="doctor">Doctor</option>
<option value="nurse">Nurse</option>
</select>
</div>

<button class="btn">Register</button>
</form>

<p style="margin-top:15px;text-align:center;">
Already have account? 
<span class="link" id="openLogin">Login</span>
</p>
</div>

<!-- OTP -->
<div id="otpPage" class="auth-content">
<div class="form-group">
<label>Enter OTP</label>
<input type="text" id="otpInput">
</div>
<button class="btn" id="verifyOtp">Verify</button>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Welcome <span id="userName"></span></h2>
<p>You are logged in successfully ✅</p>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let tempUser = null;
let generatedOTP = null;

/* DEMO USER */
if(users.length === 0){
users.push({
email:"admin@medicare.com",
password:"admin123",
name:"Admin"
});
localStorage.setItem("users",JSON.stringify(users));
}

/* SWITCH PAGES */
const loginPage = document.getElementById("loginPage");
const registerPage = document.getElementById("registerPage");
const otpPage = document.getElementById("otpPage");

document.getElementById("openRegister").onclick = ()=>{
loginPage.classList.remove("active");
registerPage.classList.add("active");
};

document.getElementById("openLogin").onclick = ()=>{
registerPage.classList.remove("active");
loginPage.classList.add("active");
};

/* REGISTER */
document.getElementById("registerForm").onsubmit = (e)=>{
e.preventDefault();

tempUser = {
name: regName.value,
email: regEmail.value,
phone: regPhone.value,
password: regPassword.value,
role: regRole.value
};

generatedOTP = Math.floor(100000 + Math.random()*900000);

alert("OTP: " + generatedOTP); // demo

registerPage.classList.remove("active");
otpPage.classList.add("active");
};

/* VERIFY OTP */
document.getElementById("verifyOtp").onclick = ()=>{
if(otpInput.value == generatedOTP){
users.push(tempUser);
localStorage.setItem("users",JSON.stringify(users));
alert("Registered successfully!");

otpPage.classList.remove("active");
loginPage.classList.add("active");
}else{
alert("Wrong OTP");
}
};

/* LOGIN */
document.getElementById("loginForm").onsubmit = (e)=>{
e.preventDefault();

let email = loginEmail.value;
let password = loginPassword.value;

let user = users.find(u=>u.email===email && u.password===password);

if(user){
document.querySelector(".auth-container").style.display="none";
document.getElementById("dashboard").style.display="block";
document.getElementById("userName").innerText=user.name;
}else{
alert("Invalid login");
}
};
</script>

</body>
</html>
