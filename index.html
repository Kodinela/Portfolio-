<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare HMS - Hospital Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; margin:0; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#2563eb,#1d4ed8); }
        .login-box { background:#fff; padding:40px; border-radius:12px; width:100%; max-width:400px; }
        input, select { width:100%; padding:12px; margin:10px 0; }
        button { width:100%; padding:12px; background:#2563eb; color:#fff; border:none; cursor:pointer; }
        #dashboard { display:none; padding:20px; }
    </style>
</head>
<body><div id="loginPage" class="login-container">
    <div class="login-box">
        <h2>MediCare HMS</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" value="admin@medicare.com" required>
            <input type="password" id="loginPassword" value="admin123" required>
            <select id="loginRole">
                <option value="Admin">Administrator</option>
                <option value="Doctor">Doctor</option>
            </select>
            <button type="submit">Sign In</button>
        </form>
    </div>
</div><div id="dashboard">
    <h1>Dashboard</h1>
    <p id="welcomeText"></p>
    <button onclick="logout()">Logout</button>
</div><script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const role = document.getElementById("loginRole").value;

    if(email === "admin@medicare.com" && password === "admin123"){
        localStorage.setItem("user", JSON.stringify({email, role}));
        showDashboard();
    } else {
        alert("Wrong credentials");
    }
});

function showDashboard(){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    const user = JSON.parse(localStorage.getItem("user"));
    document.getElementById("welcomeText").innerText = "Welcome " + user.role;
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// Auto login if already saved
if(localStorage.getItem("user")){
    showDashboard();
}
</script></body>
</html>
