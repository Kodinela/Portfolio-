<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare HMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#0f172a;color:white;}

/* AUTH */
.auth-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.auth-box{
background:white;
color:black;
padding:30px;
border-radius:12px;
width:100%;
max-width:400px;
}

.form-group{margin-bottom:15px;}
input,select{
width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;
}

button{
width:100%;padding:12px;border:none;background:#2563eb;color:white;border-radius:8px;
}

.link{color:#2563eb;cursor:pointer;}

/* DASHBOARD */
.dashboard{
display:none;
height:100vh;
}

.sidebar{
width:70px;
background:#020617;
padding-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.sidebar i{
color:#94a3b8;
cursor:pointer;
}

.sidebar i:hover{color:white;}

.main{
flex:1;
padding:20px;
background:#0f172a;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div class="auth-container" id="authPage">
<div class="auth-box">

<h2 style="text-align:center;">MediCare HMS</h2>

<!-- LOGIN -->
<div id="loginPage">
<form id="loginForm">
<div class="form-group">
<input type="email" id="loginEmail" placeholder="Email" required>
</div>
<div class="form-group">
<input type="password" id="loginPassword" placeholder="Password" required>
</div>
<button>Login</button>
</form>

<p style="text-align:center;margin-top:10px;">
No account? <span class="link" id="goRegister">Register</span>
</p>
</div>

<!-- REGISTER -->
<div id="registerPage" style="display:none;">
<form id="registerForm">
<div class="form-group"><input id="regName" placeholder="Full Name" required></div>
<div class="form-group"><input id="regEmail" type="email" placeholder="Email" required></div>
<div class="form-group"><input id="regPassword" type="password" placeholder="Password" required></div>

<button>Register</button>
</form>

<p style="text-align:center;margin-top:10px;">
Have account? <span class="link" id="goLogin">Login</span>
</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">
<i class="fas fa-chart-line nav" data-page="dashboard"></i>
<i class="fas fa-user-injured nav" data-page="patients"></i>
<i class="fas fa-calendar nav" data-page="appointments"></i>
<i class="fas fa-user-md nav" data-page="doctors"></i>
<i class="fas fa-file-medical nav" data-page="records"></i>
<i class="fas fa-money-bill nav" data-page="billing"></i>
<i class="fas fa-pills nav" data-page="pharmacy"></i>
</div>

<div class="main">
<div class="header">
<h2 id="pageTitle">Dashboard</h2>
<div>
<span id="userName"></span>
</div>
</div>

<div id="content"></div>
</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

/* DEMO USER */
if(users.length === 0){
users.push({email:"admin@medicare.com",password:"admin123",name:"Admin"});
localStorage.setItem("users",JSON.stringify(users));
}

/* SWITCH AUTH */
goRegister.onclick = ()=>{
loginPage.style.display="none";
registerPage.style.display="block";
};

goLogin.onclick = ()=>{
registerPage.style.display="none";
loginPage.style.display="block";
};

/* REGISTER */
registerForm.onsubmit = (e)=>{
e.preventDefault();

users.push({
name:regName.value,
email:regEmail.value,
password:regPassword.value
});

localStorage.setItem("users",JSON.stringify(users));

alert("Registered! Now login");
goLogin.click();
};

/* LOGIN */
loginForm.onsubmit = (e)=>{
e.preventDefault();

let user = users.find(u=>u.email===loginEmail.value && u.password===loginPassword.value);

if(user){
authPage.style.display="none";
dashboard.style.display="flex";
userName.innerText=user.name;

loadPage("dashboard");
}else{
alert("Invalid login");
}
};

/* NAVIGATION */
document.querySelectorAll(".nav").forEach(btn=>{
btn.onclick=()=>loadPage(btn.dataset.page);
});

/* LOAD PAGES */
function loadPage(page){
pageTitle.innerText = page.toUpperCase();

switch(page){

case "dashboard":
content.innerHTML = `
<div class="card">
<canvas id="chart"></canvas>
</div>
`;
setTimeout(()=>{
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Patients","Doctors","Appointments"],
datasets:[{data:[10,5,7]}]
}
});
},100);
break;

case "patients":
content.innerHTML = `<div class="card">Patients module working ✅</div>`;
break;

case "appointments":
content.innerHTML = `<div class="card">Appointments module working ✅</div>`;
break;

case "doctors":
content.innerHTML = `<div class="card">Doctors module working ✅</div>`;
break;

case "records":
content.innerHTML = `<div class="card">Medical records working ✅</div>`;
break;

case "billing":
content.innerHTML = `<div class="card">Billing system working ✅</div>`;
break;

case "pharmacy":
content.innerHTML = `<div class="card">Pharmacy working ✅</div>`;
break;

}
}

</script>

</body>
</html>
